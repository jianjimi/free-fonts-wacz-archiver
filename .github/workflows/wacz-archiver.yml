name: "🏛️ 字体版权 WACZ 存证引擎 (高可信版)"

on:
  workflow_dispatch:
    inputs:
      font_name:
        description: '字体标识 (如: Alibaba_PuHuiTi, ⚠️请用英文/拼音和下划线，勿带空格)'
        required: true
        type: string
      license_url:
        description: '授权网页的完整 URL (如: https://...)'
        required: true
        type: string

# 🛡️ 核心权限配置：必须开启以生成不可伪造的证明
permissions:
  contents: write 
  id-token: write
  attestations: write

jobs:
  archive-and-release:
    runs-on: ubuntu-latest
    steps:
      # 1. 初始化：设置北京时间
      - name: ⏱️ 初始化变量与时间戳 (北京时间)
        id: vars
        run: |
          # 设置时区为北京时间
          BEIJING_NOW=$(TZ='Asia/Shanghai' date +'%Y%m%d-%H%M%S')
          BEIJING_DISPLAY=$(TZ='Asia/Shanghai' date +'%Y-%m-%d %H:%M:%S')
          
          echo "date=$BEIJING_DISPLAY" >> $GITHUB_ENV
          echo "RELEASE_TAG=archive-${{ inputs.font_name }}-$BEIJING_NOW" >> $GITHUB_ENV

      # 2. 拉取仓库代码 (使用 Hash 锁定确保安全)
      - name: 📥 拉取仓库代码
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      # 3. 运行 Browsertrix 抓取
      - name: 🕷️ 运行 Browsertrix 抓取并生成 WACZ
        run: |
          mkdir -p crawls
          docker run --rm -v $PWD/crawls:/crawls/ webrecorder/browsertrix-crawler crawl \
            --url "${{ inputs.license_url }}" \
            --generateWACZ \
            --text \
            --workers 1 \
            --limit 1 \
            --depth 0 \
            --collection "${{ inputs.font_name }}"

      # 4. 计算哈希值
      - name: 🔐 计算 SHA-256 数字指纹
        run: |
          FILE_PATH="./crawls/collections/${{ inputs.font_name }}/${{ inputs.font_name }}.wacz"
          HASH=$(sha256sum "$FILE_PATH" | awk '{ print $1 }')
          echo "WACZ_HASH=$HASH" >> $GITHUB_ENV
          echo "WACZ_FILE=$FILE_PATH" >> $GITHUB_ENV
          echo "✅ 生成完毕，SHA-256 指纹为: $HASH"

      # 5. 生成 GitHub 官方构建证明 (SLSA)
      - name: 📜 生成 GitHub 官方构建证明 (SLSA Provenance)
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: "${{ env.WACZ_FILE }}"

      # 6. 生成区块链可信时间戳 (OpenTimestamps)
      - name: 🕒 生成 OpenTimestamps 可信时间戳
        run: |
          sudo apt-get update && sudo apt-get install -y python3-pip
          pip3 install opentimestamps-client --break-system-packages
          ots stamp "${{ env.WACZ_FILE }}"
          echo "OTS_FILE=${{ env.WACZ_FILE }}.ots" >> $GITHUB_ENV
          echo "✅ 时间戳文件已生成"

      # 7. 发布 Release 并上传附件
      - name: 🚀 发布到 GitHub Releases
        uses: softprops/action-gh-release@c95fe1489396fe8a9eb87c0abf8aa5b2ef267fda # v2.2.1
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: "📜 存证存档: ${{ inputs.font_name }}"
          body: |
            ## ⚖️ 字体版权数字存证档案 (WACZ)
            
            - **字体标识**: `${{ inputs.font_name }}`
            - **目标来源**: [点击访问原始链接](${{ inputs.license_url }})
            - **抓取时间**: ${{ env.date }} (北京时间)
            - **SHA-256 指纹**: `${{ env.WACZ_HASH }}`
            - **存证节点**: GitHub Actions (Ubuntu Environment)
            
            ---
            
            ### 🛡️ 证据防伪造声明 (High-Trust)
            为了防止篡改，本存证已引入密码学级的双重验证机制：
            
            1. **💻 官方云端构建证明 (SLSA Attestation)**: 
               本 Release 附件已由 GitHub 官方提供数字签名，证明文件完全由自动化脚本生成。
               > 验证命令: `gh attestation verify ${{ inputs.font_name }}.wacz -o ${{ github.repository_owner }}`
            
            2. **🕒 密码学时间戳 (OpenTimestamps)**: 
               附件中的 `.ots` 文件证明了该文件在 `${{ env.date }}` 确实已经存在。
            
            ---
            
            ### 🔍 如何验证与回放该证据？
            1. 下载下方的 `.wacz` 文件。
            2. 在 [ReplayWeb.page](https://replayweb.page/) 中打开即可 1:1 还原网页。
          files: |
            ${{ env.WACZ_FILE }}
            ${{ env.OTS_FILE }}
