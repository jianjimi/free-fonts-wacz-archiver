name: "рҹҸӣпёҸ еӯ—дҪ“зүҲжқғ WACZ еӯҳиҜҒеј•ж“Һ (и§Ҷи§үеўһејәзүҲ)"

on:
  workflow_dispatch:
    inputs:
      font_name:
        description: 'еӯ—дҪ“ж ҮиҜҶ (еҰӮ: Alibaba_PuHuiTi, вҡ пёҸиҜ·з”ЁиӢұж–Ү/жӢјйҹіе’ҢдёӢеҲ’зәҝпјҢеӢҝеёҰз©әж ј)'
        required: true
        type: string
      license_url:
        description: 'жҺҲжқғзҪ‘йЎөзҡ„е®Ңж•ҙ URL (еҰӮ: https://...)'
        required: true
        type: string

permissions:
  contents: write 
  id-token: write
  attestations: write

jobs:
  archive-and-release:
    runs-on: ubuntu-latest
    steps:
      # 1. еҲқе§ӢеҢ–еҸҳйҮҸ
      - name: вҸұпёҸ еҲқе§ӢеҢ–еҸҳйҮҸдёҺж—¶й—ҙжҲі (еҢ—дә¬ж—¶й—ҙ)
        id: vars
        run: |
          BEIJING_NOW=$(TZ='Asia/Shanghai' date +'%Y%m%d-%H%M%S')
          BEIJING_DISPLAY=$(TZ='Asia/Shanghai' date +'%Y-%m-%d %H:%M:%S')
          echo "date=$BEIJING_DISPLAY" >> $GITHUB_ENV
          echo "RELEASE_TAG=archive-${{ inputs.font_name }}-$BEIJING_NOW" >> $GITHUB_ENV
          echo "NEW_FILENAME=${{ inputs.font_name }}_$BEIJING_NOW" >> $GITHUB_ENV

      - name: рҹ“Ҙ жӢүеҸ–д»“еә“д»Јз Ғ
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      # 2. жҲӘеӣҫжӯҘйӘӨ (е·Ідҝ®жӯЈеҸӮж•°)
      - name: рҹ“ё з”ҹжҲҗзҪ‘йЎөе…Ёй•ҝжҲӘеӣҫ
        run: |
          pip install shot-scraper
          shot-scraper install
          shot-scraper shot "${{ inputs.license_url }}" \
            --full \
            --width 1280 \
            --wait 3000 \
            -o "./${{ env.NEW_FILENAME }}.png"
          echo "PNG_FILE=./${{ env.NEW_FILENAME }}.png" >> $GITHUB_ENV

      # 3. жҠ“еҸ– WACZ
      - name: рҹ•·пёҸ иҝҗиЎҢ Browsertrix жҠ“еҸ–
        run: |
          mkdir -p crawls
          docker run --rm -v $PWD/crawls:/crawls/ webrecorder/browsertrix-crawler crawl \
            --url "${{ inputs.license_url }}" \
            --generateWACZ \
            --text \
            --workers 1 \
            --limit 1 \
            --depth 0 \
            --collection "${{ inputs.font_name }}"

      # 4. йҮҚе‘ҪеҗҚдёҺи®Ўз®—
      - name: рҹ“Ӯ еӨ„зҗҶеӯҳиҜҒж–Үд»¶
        run: |
          OLD_PATH="./crawls/collections/${{ inputs.font_name }}/${{ inputs.font_name }}.wacz"
          NEW_PATH="./crawls/collections/${{ inputs.font_name }}/${{ env.NEW_FILENAME }}.wacz"
          mv "$OLD_PATH" "$NEW_PATH"
          echo "WACZ_FILE=$NEW_PATH" >> $GITHUB_ENV
          HASH=$(sha256sum "$NEW_PATH" | awk '{ print $1 }')
          echo "WACZ_HASH=$HASH" >> $GITHUB_ENV

      # 5. е®үе…ЁиҜҒжҳҺдёҺж—¶й—ҙжҲі
      - name: рҹ“ң з”ҹжҲҗ GitHub SLSA иҜҒжҳҺ
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: "${{ env.WACZ_FILE }}"

      - name: рҹ•’ з”ҹжҲҗ OpenTimestamps ж—¶й—ҙжҲі
        run: |
          sudo apt-get update && sudo apt-get install -y python3-pip
          pip3 install opentimestamps-client --break-system-packages
          ots stamp "${{ env.WACZ_FILE }}"
          echo "OTS_FILE=${{ env.WACZ_FILE }}.ots" >> $GITHUB_ENV

      # 6. жңҖз»ҲеҸ‘еёғ
      - name: рҹҡҖ еҸ‘еёғеҲ° GitHub Releases
        uses: softprops/action-gh-release@c95fe1489396fe8a9eb87c0abf8aa5b2ef267fda
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: "рҹ“ң еӯҳиҜҒеӯҳжЎЈ: ${{ inputs.font_name }} (${{ env.date }})"
          body: |
            ## вҡ–пёҸ еӯ—дҪ“зүҲжқғж•°еӯ—еӯҳиҜҒжЎЈжЎҲ
            - **еӯ—дҪ“ж ҮиҜҶ**: `${{ inputs.font_name }}`
            - **жҠ“еҸ–ж—¶й—ҙ**: ${{ env.date }} (еҢ—дә¬ж—¶й—ҙ)
            - **е“ҲеёҢжҢҮзә№**: `${{ env.WACZ_HASH }}`
            
            ### рҹ“Ұ йҷ„д»¶жё…еҚ•
            1. `.wacz`: е®Ңж•ҙдәӨдә’ејҸзҪ‘йЎөжЎЈжЎҲ
            2. `.png`: зҪ‘йЎөе…Ёй•ҝжҲӘеӣҫ (ж»ҡеҠЁеҲ°еә•йғЁ)
            3. `.ots`: еҢәеқ—й“ҫж—¶й—ҙжҲіиҜҒжҳҺ
          files: |
            ${{ env.WACZ_FILE }}
            ${{ env.OTS_FILE }}
            ${{ env.PNG_FILE }}
