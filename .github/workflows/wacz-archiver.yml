name: "🏛️ 字体版权 WACZ 存证引擎 (深度存证版)"

on:
  workflow_dispatch:
    inputs:
      font_name:
        description: '字体标识 (如: Alibaba_PuHuiTi, ⚠️请用英文/拼音和下划线，勿带空格)'
        required: true
        type: string
      license_url:
        description: '授权网页的完整 URL'
        required: true
        type: string

permissions:
  contents: write 
  id-token: write
  attestations: write

jobs:
  archive-and-release:
    runs-on: ubuntu-latest
    steps:
      # 1. 初始化变量 (北京时间)
      - name: ⏱️ 初始化变量与时间戳
        id: vars
        run: |
          BEIJING_NOW=$(TZ='Asia/Shanghai' date +'%Y%m%d-%H%M%S')
          BEIJING_DISPLAY=$(TZ='Asia/Shanghai' date +'%Y-%m-%d %H:%M:%S')
          echo "date=$BEIJING_DISPLAY" >> $GITHUB_ENV
          echo "RELEASE_TAG=archive-${{ inputs.font_name }}-$BEIJING_NOW" >> $GITHUB_ENV
          echo "NEW_FILENAME=${{ inputs.font_name }}_$BEIJING_NOW" >> $GITHUB_ENV

      - name: 📥 拉取仓库代码
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      # 2. 深度截图 (直接调用 Playwright 确保滚动到底部)
      - name: 📸 生成网页全长截图 (自动滚动触发懒加载)
        env:
          TARGET_URL: ${{ inputs.license_url }}
          OUT_FILE: ${{ env.NEW_FILENAME }}.png
        run: |
          pip install playwright
          playwright install chromium
          python3 - <<EOF
          import asyncio
          from playwright.async_api import async_playwright

          async def main():
              async with async_playwright() as p:
                  browser = await p.chromium.launch()
                  page = await browser.new_page(viewport={'width': 1280, 'height': 800})
                  await page.goto("${{ env.TARGET_URL }}", wait_until="networkidle")
                  
                  # 模拟真实滚动：每 100 毫秒滚动 200 像素，直到页面底部
                  await page.evaluate("""
                      async () => {
                          await new Promise((resolve) => {
                              let totalHeight = 0;
                              let distance = 200;
                              let timer = setInterval(() => {
                                  let scrollHeight = document.body.scrollHeight;
                                  window.scrollBy(0, distance);
                                  totalHeight += distance;
                                  if(totalHeight >= scrollHeight) {
                                      clearInterval(timer);
                                      resolve();
                                  }
                              }, 100);
                          });
                      }
                  """)
                  # 给一点缓冲时间加载最后出现的图片
                  await page.wait_for_timeout(2000)
                  # 截取全长图
                  await page.screenshot(path="${{ env.OUT_FILE }}", full_page=True)
                  await browser.close()

          asyncio.run(main())
          EOF
          echo "PNG_FILE=./${OUT_FILE}" >> $GITHUB_ENV

      # 3. 运行 Browsertrix 抓取 WACZ
      - name: 🕷️ 运行 Browsertrix 抓取
        run: |
          mkdir -p crawls
          docker run --rm -v $PWD/crawls:/crawls/ webrecorder/browsertrix-crawler crawl \
            --url "${{ inputs.license_url }}" \
            --generateWACZ \
            --text \
            --workers 1 \
            --limit 1 \
            --depth 0 \
            --collection "${{ inputs.font_name }}"

      # 4. 重命名与哈希
      - name: 📂 处理存证文件
        run: |
          OLD_PATH="./crawls/collections/${{ inputs.font_name }}/${{ inputs.font_name }}.wacz"
          NEW_PATH="./crawls/collections/${{ inputs.font_name }}/${{ env.NEW_FILENAME }}.wacz"
          mv "$OLD_PATH" "$NEW_PATH"
          echo "WACZ_FILE=$NEW_PATH" >> $GITHUB_ENV
          HASH=$(sha256sum "$NEW_PATH" | awk '{ print $1 }')
          echo "WACZ_HASH=$HASH" >> $GITHUB_ENV

      # 5. 安全证明 (SLSA)
      - name: 📜 生成 GitHub SLSA 证明
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: "${{ env.WACZ_FILE }}"

      # 6. 区块链时间戳 (OTS)
      - name: 🕒 生成 OpenTimestamps 时间戳
        run: |
          sudo apt-get update && sudo apt-get install -y python3-pip
          pip3 install opentimestamps-client --break-system-packages
          ots stamp "${{ env.WACZ_FILE }}"
          echo "OTS_FILE=${{ env.WACZ_FILE }}.ots" >> $GITHUB_ENV

      # 7. 最终发布
      - name: 🚀 发布到 GitHub Releases
        uses: softprops/action-gh-release@c95fe1489396fe8a9eb87c0abf8aa5b2ef267fda
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: "📜 存证存档: ${{ inputs.font_name }} (${{ env.date }})"
          body: |
            ## ⚖️ 字体版权数字存证档案 (深度存证版)
            - **字体标识**: `${{ inputs.font_name }}`
            - **抓取时间**: ${{ env.date }} (北京时间)
            - **WACZ 哈希**: `${{ env.WACZ_HASH }}`
            
            ### 📦 证据清单
            1. `.wacz`: 高可信交互式网页档案 (支持 ReplayWeb.page 回放)
            2. `.png`: **深度滚动全长截图** (已触发懒加载图片)
            3. `.ots`: 区块链时间戳原始存证
            
            ---
            ### 🛡️ 校验说明
            - **SLSA 验证**: `gh attestation verify ${{ env.NEW_FILENAME }}.wacz -o ${{ github.repository_owner }}`
            - **OTS 验证**: 初始状态为 `pending`，待比特币网络确认(约数小时)后可完成全量验证。
          files: |
            ${{ env.WACZ_FILE }}
            ${{ env.OTS_FILE }}
            ${{ env.PNG_FILE }}
